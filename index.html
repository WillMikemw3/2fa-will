<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gerador TOTP · MEC VENDAS</title>

    <style>
        :root {
            --bg: #0c0d11;
            --card-bg: #11151b;
            --accent: #0ea5e9;
            --text-light: #e5e7eb;
            --text-muted: #9ca3af;
            --input-bg: #161b22;
            --border: #2a2f38;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 14px;
            padding: 28px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .brandTitle {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: var(--accent);
        }

        .brandSubtitle {
            font-size: 14px;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .signature {
            font-size: 12px;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-light);
            border-radius: 8px;
            font-size: 15px;
        }

        .otpBox {
            margin-top: 20px;
            background: var(--input-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            text-align: center;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .otpBox:hover {
            border-color: var(--accent);
        }

        .otpCode {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 8px;
            color: var(--accent);
        }

        .timer {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .progress {
            height: 6px;
            width: 100%;
            background: #1f2937;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress i {
            display: block;
            height: 100%;
            width: 0%;
            background: var(--accent);
        }

        .copyMsg {
            font-size: 12px;
            color: var(--accent);
            margin-top: 6px;
            display: none;
        }

        .footer {
            font-size: 12px;
            text-align: center;
            color: var(--text-muted);
            margin-top: 16px;
        }

        @media (max-width:500px) {
            .card {
                padding: 20px;
            }

            .otpCode {
                font-size: 34px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="brandTitle">MEC VENDAS</div>
        <div class="brandSubtitle">Gerador 2FA · Authenticator</div>
        <div class="signature">Desenvolvido por MEC VENDAS</div>

        <input id="secret" type="text" placeholder="Cole a Chave 2FA Aqui...">

        <div class="otpBox" id="otpBox">
            <div class="otpCode" id="codeArea">------</div>
            <div class="timer" id="timerArea">Aguardando chave...</div>
            <div class="progress"><i id="progressBar"></i></div>
            <div class="copyMsg" id="copyMsg">Copiado automaticamente ✓</div>
        </div>

        <div class="footer">Painel Corporativo · MEC VENDAS</div>
    </div>

    <script>
        function normalizeBase32(s) { return s.replace(/[^A-Z2-7=]/gi, '').replace(/\s+/g, '').toUpperCase(); }

        function base32ToBytes(base32) {
            const clean = normalizeBase32(base32).replace(/=+$/, '');
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            let bits = 0, value = 0, out = [];
            for (let i = 0; i < clean.length; i++) {
                const idx = alphabet.indexOf(clean[i]);
                if (idx === -1) continue;
                value = (value << 5) | idx; bits += 5;
                if (bits >= 8) { bits -= 8; out.push((value >> bits) & 0xFF); }
            }
            return new Uint8Array(out);
        }

        async function hmacSha1(keyBytes, messageBytes) {
            const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
            const sig = await crypto.subtle.sign('HMAC', key, messageBytes);
            return new Uint8Array(sig);
        }

        function intToBytesBE(n) {
            const b = new ArrayBuffer(8); const view = new DataView(b);
            let bn = BigInt(n);
            for (let i = 7; i >= 0; i--) { view.setUint8(i, Number(bn & 0xFFn)); bn = bn >> 8n; }
            return new Uint8Array(b);
        }

        async function generateTotpFromSecret(secretBase32, step = 30) {
            const keyBytes = base32ToBytes(secretBase32);
            if (!keyBytes.length) throw new Error();
            const T = Math.floor(Date.now() / 1000 / step);
            const counter = intToBytesBE(BigInt(T));
            const hmac = await hmacSha1(keyBytes.buffer, counter.buffer);
            const offset = hmac[hmac.length - 1] & 0x0f;
            const code = ((hmac[offset] & 0x7f) << 24) | ((hmac[offset + 1] & 0xff) << 16) | ((hmac[offset + 2] & 0xff) << 8) | (hmac[offset + 3] & 0xff);
            const otp = String(code % 1e6).padStart(6, '0');
            const remaining = step - (Math.floor(Date.now() / 1000) % step);
            return { otp, remaining };
        }

        const secretInput = document.getElementById('secret');
        const codeArea = document.getElementById('codeArea');
        const timerArea = document.getElementById('timerArea');
        const progressBar = document.getElementById('progressBar');
        const copyMsg = document.getElementById('copyMsg');
        const otpBox = document.getElementById('otpBox');

        let interval;

        async function refresh() {
            const secret = secretInput.value.trim();
            if (!secret) { codeArea.textContent = "------"; timerArea.textContent = "Aguardando chave..."; progressBar.style.width = "0%"; return; }
            try {
                const res = await generateTotpFromSecret(secret);
                codeArea.textContent = res.otp;
                timerArea.textContent = "Expira em " + res.remaining + "s";
                progressBar.style.width = ((30 - res.remaining) / 30) * 100 + "%";
            } catch {
                codeArea.textContent = "------"; timerArea.textContent = "Chave inválida"; progressBar.style.width = "0%";
            }
        }

        /* 🔥 Atualização automática sem clicar */
        secretInput.addEventListener('input', () => {
            clearInterval(interval);
            refresh();
            interval = setInterval(refresh, 1000);
        });

        /* 🔥 Clique no código = copia automático */
        otpBox.addEventListener('click', async () => {
            const code = codeArea.textContent;
            if (code === "------") return;
            await navigator.clipboard.writeText(code);
            copyMsg.style.display = "block";
            setTimeout(() => copyMsg.style.display = "none", 1500);
        });
    </script>
</body>

</html>
